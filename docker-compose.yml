version: '3.9'

services:
  # ─── MongoDB ──────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: vaultexp-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
      MONGO_INITDB_DATABASE: vaultexp
    volumes:
      - mongo_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - vaultexp-network

  # ─── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: vaultexp-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - vaultexp-network

  # ─── Backend API ──────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: vaultexp-server
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://root:rootpassword@mongodb:27017/vaultexp?authSource=admin
      REDIS_URL: redis://redis:6379
    env_file:
      - .env
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./server:/app
      - /app/node_modules
    networks:
      - vaultexp-network

  # ─── Frontend Client ──────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: vaultexp-client
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://server:5000/api/v1
    env_file:
      - .env
    depends_on:
      - server
    volumes:
      - ./client:/app
      - /app/node_modules
      - /app/.next
    networks:
      - vaultexp-network

# ─── Volumes ──────────────────────────────────────────────
volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local

# ─── Networks ─────────────────────────────────────────────
networks:
  vaultexp-network:
    driver: bridge
